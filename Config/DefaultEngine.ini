[/Script/Engine.GameEngine]
; SteamSockets enruta el trafico real de juego (no el matchmaking, eso ya iba por Steam)
; a traves de los relays de Valve, asi evita pedirle a cada jugador que abra puertos en su
; router. Solo se activa en build empaquetado/standalone (-game), no en el Editor/PIE — ahi
; cae solo al fallback de IpNetDriver de toda la vida.
; IMPORTANTE: el motor resuelve esta clase con StaticLoadClass, que requiere el prefijo
; "/Script/" (ver BaseEngine.ini: todas las entradas nativas de NetDriverDefinitions lo usan).
; Sin el prefijo, StaticLoadClass no encuentra la clase y el motor cae al fallback en
; silencio (sin loguear ningún error) — eso hacía que SteamSocketsNetDriver nunca se usara.
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/SteamSockets.SteamSocketsNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")

; ============================================================
; Online Subsystem — Steam (sesiones online reales vía Steam Matchmaking)
; SteamDevAppId=480 es el AppId publico de Valve (Spacewar): permite que
; el SDK de Steamworks inicialice y haga matchmaking sin tener cuenta de
; Steamworks propia todavia. Reemplazar por el AppId real al pagar la
; cuenta de Steamworks (no requiere tocar el codigo de gameplay).
; ============================================================
[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=True
SteamDevAppId=480
; Habilita el SteamSockets NetDriver (en vez de quedar atado al IpNetDriver de siempre).
bUseSteamNetworking=True
; Permite que la conexion pase por los relays de Valve si el NAT-punchthrough directo falla
; (el caso tipico de dos jugadores en redes/paises distintos, como el test pendiente).
bAllowP2PPacketRelay=True
bRelaunchInSteam=False

